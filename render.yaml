databases:
  - name: yuvaraja-portfolio-db
    plan: free
    databaseName: yuvaraja_portfolio

services:
  - type: web
    name: yuvaraja-portfolio
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: yuvaraja-portfolio-db
          property: connectionString
